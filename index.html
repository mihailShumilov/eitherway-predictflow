<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080c16" />

    <!--
      Baseline CSP. Allowlisted hosts for:
        • Fonts (Google)
        • DFlow REST proxy (self) + quote/order endpoints
        • DFlow WS live-price feed
        • Solana RPC providers (public + common providers)
        • Wallet provider icons
        • Proof KYC redirect target

      Host-level headers (vercel.json / netlify.toml) can override with
      tighter, env-aware values. `'unsafe-inline'` on style-src is retained
      because Tailwind + lucide-react's inline SVG styles require it;
      script-src now drops `'unsafe-inline'`.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        base-uri 'self';
        object-src 'none';
        frame-ancestors 'self';
        form-action 'self';
        img-src 'self' data: https://phantom.app https://solflare.com https://backpack.app https://us.i.posthog.com https://us-assets.i.posthog.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' data: https://fonts.gstatic.com;
        script-src 'self' https://us-assets.i.posthog.com;
        script-src-elem 'self' https://us-assets.i.posthog.com;
        connect-src 'self'
          http://localhost:8787
          https://api.predictflow.org
          https://*.workers.dev
          https://*.dflow.net
          wss://*.dflow.net
          wss://api.prod.dflow.net
          https://*.solana.com
          https://*.helius-rpc.com
          https://*.quiknode.pro
          https://*.triton.one
          https://us.i.posthog.com
          https://us-assets.i.posthog.com;
        manifest-src 'self';
        worker-src 'self' blob:;
        media-src 'self' blob:;
        upgrade-insecure-requests;
      "
    />

    <title>PredictFlow — Prediction Market Trading Terminal</title>
    <meta name="description" content="The first conditional trading terminal for prediction markets on Solana. Limit orders, stop-loss, take-profit, and DCA for Kalshi markets via DFlow." />
    <meta name="keywords" content="prediction markets, Solana, DFlow, Kalshi, trading terminal, DCA, limit orders, stop-loss" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PredictFlow" />
    <meta property="og:title" content="PredictFlow — Prediction Market Trading Terminal" />
    <meta property="og:description" content="The first conditional trading terminal for prediction markets on Solana. Limit orders, stop-loss, take-profit, and DCA for Kalshi markets via DFlow." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PredictFlow — Prediction Market Trading Terminal" />
    <meta name="twitter:description" content="The first conditional trading terminal for prediction markets on Solana. Limit orders, stop-loss, take-profit, and DCA for Kalshi markets via DFlow." />
    <meta name="twitter:image" content="/og-image.svg" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-[#080c16] text-[#e2e8f0]">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
