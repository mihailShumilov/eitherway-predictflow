# Nginx snippet for PredictFlow. Drop into your server block.
#
# Assumes `vite build` output is served from /var/www/predictflow/dist.
# Terminates /api/dflow proxy to DFlow upstream. Adjust upstream as needed.

server {
    listen 443 ssl http2;
    server_name predictflow.example.com;

    root /var/www/predictflow/dist;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # DFlow REST proxy (swap dev-prediction-markets-api → prod once available)
    location /api/dflow/ {
        proxy_pass https://dev-prediction-markets-api.dflow.net/;
        proxy_set_header Host dev-prediction-markets-api.dflow.net;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 30s;
    }

    # Long-cache hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
